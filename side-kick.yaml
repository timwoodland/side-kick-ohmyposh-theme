# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

upgrade:
  source: cdn
  interval: 168h
  auto: false
  notice: false

console_title_template: "{{ .Shell }} in {{ .Folder }}"

blocks:
  - type: prompt
    newline: true
    alignment: left
    segments:
      - type: path
        style: diamond
        foreground: "green"
        background: "transparent"
        options:
          style: agnoster_short
          max_depth: 5
        template: " {{ .Path }} "
      - type: git
        style: plain
        foreground: magenta
        background: "transparent"
        options:
          branch_template: "{{ trunc 25 .Branch }}"
          fetch_status: true
          fetch_upstream_icon: true
        template: " {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} "
        # foreground: "#43CCEA"
        # background: "#29315A"
        # foreground_templates:
        #   - "{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}"
        #   - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}"
        #   - "{{ if gt .Ahead 0 }}#B388FF{{ end }}"
        #   - "{{ if gt .Behind 0 }}#B388FF{{ end }}"
      - type: status
        style: plain
        foreground: "red"
        template: "x "

  - type: prompt
    alignment: right
    segments:
      - type: python
        style: plain
        foreground: cyan
        template: "   {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}"
        # template: "  {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}"
        options:
          display_mode: files
          fetch_virtual_env: true
      - type: dart
        style: plain
        foreground: cyan
        template: "   {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}"
        options:
          display_mode: files

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground: "white"
        template: "❯ "

  - type: rprompt
    overflow: hidden
    segments:
      - type: executiontime
        style: plain
        foreground: yellow
        options:
          threshold: 5000
        template: "{{ .FormattedMs }}"

secondary_prompt:
  template: "❯❯ "
  foreground: white

transient_prompt:
  template: "❯ "
  background: transparent
  foreground: green

version: 4
